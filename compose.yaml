services:

  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://locmns:locmns@database:3306/locmns?serverVersion=8.0&charset=utf8mb4"

  database:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: locmns
      MYSQL_USER: locmns
      MYSQL_PASSWORD: locmns
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - database_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  database_data:
